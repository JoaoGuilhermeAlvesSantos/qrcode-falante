<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e94560" />
  <meta name="description" content="Leitor de QR Code com síntese de voz em português e inglês" />
  <link rel="manifest" href="./manifest.json" />
  <title>QR Code Falante</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #e94560;
      --accent-dark: #c73652;
      --text: #eaeaea;
      --text-muted: #a0a0b0;
      --success: #4caf87;
      --warning: #f4a261;
      --error: #e94560;
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: var(--surface);
      padding: 1.2rem 1.5rem;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    main {
      width: 100%;
      max-width: 480px;
      padding: 1.5rem 1rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* Scanner container */
    #leitor-wrapper {
      position: relative;
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: #0d0d1a;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #2a2a4a;
    }

    #leitor {
      width: 100%;
    }

    #leitor.ativo {
      min-height: 280px;
    }

    /* Placeholder quando câmera está inativa */
    #camera-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      color: var(--text-muted);
      padding: 2rem;
      text-align: center;
    }

    #camera-placeholder svg {
      opacity: 0.4;
    }

    #camera-placeholder p {
      font-size: 0.9rem;
    }

    /* Resultado */
    #resultado {
      min-height: 80px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      text-align: center;
      border: 1px solid #2a2a4a;
      transition: all 0.3s ease;
    }

    #resultado.encontrado {
      border-color: var(--success);
      background: rgba(76, 175, 135, 0.1);
    }

    #resultado.nao-encontrado {
      border-color: var(--warning);
      background: rgba(244, 162, 97, 0.1);
      color: var(--warning);
    }

    #resultado.erro {
      border-color: var(--error);
      background: rgba(233, 69, 96, 0.1);
      color: var(--error);
    }

    .resultado-pt {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      display: block;
    }

    .resultado-en {
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--accent);
      display: block;
    }

    /* Botões */
    .botoes {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.8rem;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:active {
      transform: scale(0.96);
    }

    #btn-iniciar {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(233, 69, 96, 0.4);
    }

    #btn-iniciar:hover {
      background: var(--accent-dark);
      box-shadow: 0 6px 18px rgba(233, 69, 96, 0.5);
    }

    #btn-parar {
      display: none;
      background: #2a2a4a;
      color: var(--text);
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }

    #btn-parar:hover {
      background: #3a3a5a;
    }

    /* Lista de itens disponíveis */
    details {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid #2a2a4a;
      overflow: hidden;
    }

    summary {
      padding: 0.9rem 1.2rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-muted);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
    }

    summary::-webkit-details-marker { display: none; }

    summary::after {
      content: '▾';
      margin-left: auto;
      transition: transform 0.2s;
    }

    details[open] summary::after {
      transform: rotate(180deg);
    }

    #lista-itens {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.55rem;
      padding: 0.8rem 1rem 1rem;
    }

    .item-card {
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 0.55rem 0.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.55rem;
    }

    .item-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .item-info strong {
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-info .item-en {
      color: var(--text-muted);
      font-size: 0.74rem;
      line-height: 1.1;
    }

    .item-info .item-id {
      font-family: monospace;
      font-size: 0.7rem;
      color: var(--accent);
      opacity: 0.9;
    }

    .item-actions {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .item-action-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      padding: 0;
      background: #181832;
      border: 1px solid #2f2f58;
      color: var(--text);
      box-shadow: none;
    }

    .item-action-btn svg {
      width: 16px;
      height: 16px;
    }

    .item-action-btn:hover {
      border-color: var(--accent);
      background: #212144;
    }

    .item-action-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .item-action-play {
      color: var(--success);
    }

    .item-action-download {
      color: var(--accent);
    }

    footer {
      margin-top: auto;
      padding: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Responsividade */
    @media (min-width: 480px) {
      main {
        padding: 2rem 1.5rem 3rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>QR Code <span>Falante</span></h1>
    <p>Aponte a câmera para um QR Code e ouça a tradução</p>
  </header>

  <main>

    <!-- Scanner -->
    <div id="leitor-wrapper">
      <div id="camera-placeholder">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 8V5a2 2 0 0 1 2-2h3"/>
          <path d="M2 16v3a2 2 0 0 0 2 2h3"/>
          <path d="M22 8V5a2 2 0 0 0-2-2h-3"/>
          <path d="M22 16v3a2 2 0 0 1-2 2h-3"/>
          <rect x="7" y="7" width="4" height="4" rx="0.5"/>
          <rect x="13" y="7" width="4" height="4" rx="0.5"/>
          <rect x="7" y="13" width="4" height="4" rx="0.5"/>
          <circle cx="15" cy="15" r="1"/>
          <circle cx="17" cy="17" r="1"/>
        </svg>
        <p>Câmera inativa</p>
      </div>
      <div id="leitor"></div>
    </div>

    <!-- Resultado -->
    <div id="resultado" role="status" aria-live="polite"></div>

    <!-- Botões -->
    <div class="botoes">
      <button id="btn-iniciar" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        Iniciar Scanner
      </button>
      <button id="btn-parar" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="1"/>
        </svg>
        Parar
      </button>
    </div>

    <!-- Lista de itens disponíveis -->
    <details>
      <summary>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/>
          <circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/>
        </svg>
        Itens disponíveis
      </summary>
      <div id="lista-itens">
        <!-- Preenchido dinamicamente pelo script.js -->
        <span style="color: var(--text-muted); font-size: 0.85rem; padding: 0.5rem;">Carregando…</span>
      </div>
    </details>

  </main>

  <footer>
    Projeto para a prof. Giuliana &mdash;
    <a href="https://github.com/JoaoGuilhermeAlvesSantos/qrcode-falante" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script src="./lib/html5-qrcode.min.js"></script>
  <script src="./lib/qrcode.min.js"></script>
  <script src="./qr-status.js"></script>
  <script src="./script.js"></script>
</body>
</html>
